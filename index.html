<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리와 법인카드 안내</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --bg3: #efefec;
      --text: #1a1a18; --text2: #6b6b67; --text3: #9b9b96;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --green: #1D9E75; --green-light: #E1F5EE; --green-dark: #085041;
      --radius: 10px; --radius-sm: 6px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a; --bg2: #262624; --bg3: #2e2e2b;
        --text: #e8e8e2; --text2: #a0a09a; --text3: #6e6e68;
        --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
        --green-light: #083d2c; --green-dark: #9FE1CB;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
    #lock-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg3); display: flex; align-items: center; justify-content: center; }
    .lock-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: 16px; padding: 2.5rem 2rem; width: 320px; text-align: center; }
    .lock-icon { width: 52px; height: 52px; border-radius: 12px; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 1.25rem; }
    .lock-title { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .lock-sub { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; line-height: 1.5; }
    .lock-input { width: 100%; padding: 11px 14px; border: 0.5px solid var(--border2); border-radius: 10px; font-size: 15px; text-align: center; letter-spacing: 4px; background: var(--bg2); color: var(--text); outline: none; font-family: inherit; transition: border-color .2s; margin-bottom: 12px; }
    .lock-input:focus { border-color: var(--green); }
    .lock-btn { width: 100%; padding: 11px; background: var(--green); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity .15s; font-family: inherit; }
    .lock-btn:hover { opacity: 0.88; }
    .lock-error { font-size: 12px; color: #e74c3c; margin-top: 10px; min-height: 18px; }
    .lock-hint { font-size: 11px; color: var(--text3); margin-top: 14px; }
    #main-content { display: none; }
    .page-header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
    .header-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .header-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .header-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
    .container { max-width: 820px; margin: 0 auto; padding: 20px 16px; }
    .search-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .search-row input { flex: 1; padding: 10px 16px; border: 0.5px solid var(--border2); border-radius: 20px; font-size: 14px; background: var(--bg); color: var(--text); outline: none; font-family: inherit; transition: border-color .2s; }
    .search-row input:focus { border-color: var(--green); }
    .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
    .tag { font-size: 12px; padding: 5px 12px; border: 0.5px solid var(--border2); border-radius: 14px; color: var(--text2); cursor: pointer; background: var(--bg); transition: all .15s; }
    .tag:hover { background: var(--bg2); color: var(--text); }
    .tag.on { border-color: var(--green); color: var(--green-dark); background: var(--green-light); }
    .tree-section { margin-bottom: 10px; }
    .cat-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); cursor: pointer; user-select: none; transition: background .15s; }
    .cat-header:hover { background: var(--bg2); }
    .cat-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .cat-title { font-size: 14px; font-weight: 500; flex: 1; }
    .cat-count { font-size: 12px; color: var(--text2); }
    .cat-arrow { font-size: 11px; color: var(--text3); transition: transform .2s; }
    .cat-arrow.open { transform: rotate(90deg); }
    .nodes { display: none; padding: 8px 0 4px 28px; flex-direction: column; gap: 6px; }
    .nodes.open { display: flex; }
    .node-row { display: flex; align-items: stretch; }
    .node-line { width: 1px; background: var(--border); margin: 0 14px; flex-shrink: 0; }
    .node-btn { flex: 1; text-align: left; padding: 10px 14px; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--bg); cursor: pointer; transition: border-color .15s, background .15s; }
    .node-btn:hover { border-color: var(--border2); background: var(--bg2); }
    .node-btn.active { border-color: var(--green); background: var(--green-light); }
    .node-kw { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; }
    .kw-chip { font-size: 10px; padding: 2px 7px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 8px; color: var(--text2); }
    .node-btn.active .kw-chip { background: var(--bg); border-color: var(--green); color: var(--green-dark); }
    .node-title { font-size: 13px; color: var(--text); font-weight: 500; }
    .answer-panel { margin-top: 6px; margin-bottom: 4px; border: 0.5px solid var(--green); border-radius: var(--radius); overflow: hidden; }
    .ans-header { padding: 12px 16px; background: var(--green-light); display: flex; align-items: center; gap: 8px; border-bottom: 0.5px solid var(--green); }
    .ans-header-text { font-size: 14px; font-weight: 500; color: var(--green-dark); flex: 1; }
    .ans-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--green); line-height: 1; }
    .ans-body { padding: 16px; background: var(--bg); }
    .ans-body p { font-size: 13px; color: var(--text); line-height: 1.7; margin-bottom: 8px; }
    .ans-list { list-style: none; display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    .ans-list li { font-size: 13px; color: var(--text); padding-left: 14px; position: relative; line-height: 1.6; }
    .ans-list li::before { content: ''; position: absolute; left: 0; top: 8px; width: 5px; height: 5px; border-radius: 50%; background: var(--green); }
    .ans-warn { font-size: 12px; color: #c0392b; background: #fdf0f0; border-left: 3px solid #e74c3c; padding: 8px 12px; border-radius: 0 6px 6px 0; margin-bottom: 8px; line-height: 1.55; }
    @media (prefers-color-scheme: dark) { .ans-warn { color: #f1948a; background: #2c1810; } }
    .ans-note { font-size: 12px; color: var(--text2); line-height: 1.55; margin-bottom: 8px; font-style: italic; }
    .ans-source { display: inline-block; font-size: 11px; padding: 3px 9px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 8px; color: var(--text2); margin-top: 4px; }
    .empty { font-size: 14px; color: var(--text2); padding: 3rem 0; text-align: center; }
    .footer { text-align: center; padding: 2rem 0 1rem; font-size: 12px; color: var(--text3); }
  </style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">우리와 법인카드 안내</div>
    <div class="lock-sub">사내 전용 페이지입니다.<br>비밀번호를 입력해 주세요.</div>
    <input class="lock-input" id="pw-input" type="password" placeholder="비밀번호" maxlength="20" onkeydown="if(event.key==='Enter') tryUnlock()" />
    <button class="lock-btn" onclick="tryUnlock()">입장하기</button>
    <div class="lock-error" id="pw-error"></div>
    <div class="lock-hint">문의: 재경팀 박지우 사원</div>
  </div>
</div>

<div id="main-content">
  <div class="page-header">
    <div class="header-icon">💳</div>
    <div>
      <div class="header-title">우리와 법인카드 안내</div>
      <div class="header-sub">키워드로 빠르게 찾는 규정 가이드 · 재경팀 2026.01 기준</div>
    </div>
  </div>
  <div class="container">
    <div class="search-row">
      <input id="srch" placeholder="키워드 검색 (예: 식대, 한도, 분실, 회의비, 접대비, 택시...)" oninput="doSearch(this.value)" />
    </div>
    <div class="tag-row" id="tags"></div>
    <div id="tree"></div>
    <div class="footer">우리와 주식회사 재경팀 · 추가 문의: 재경팀 박지우 사원</div>
  </div>
</div>

<script>
const PASSWORD = 'wooriwa01';

function tryUnlock() {
  const val = document.getElementById('pw-input').value;
  const err = document.getElementById('pw-error');
  if (val === PASSWORD) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    sessionStorage.setItem('unlocked', 'yes');
  } else {
    err.textContent = '비밀번호가 올바르지 않습니다.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
    setTimeout(() => { err.textContent = ''; }, 2500);
  }
}
if (sessionStorage.getItem('unlocked') === 'yes') {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
}

const cats = [
  {
    id:'issue', label:'발급 · 재발급', color:'#534AB7',
    nodes:[
      { id:'n1', keywords:['발급','신청','재발급','카드신청','새카드'], title:'법인카드 신규 · 재발급 신청',
        answer:{ paras:['그룹웨어에서 기안을 통해 신청합니다.'], items:['그룹웨어 → 새 기안 → 법인카드 발급 신청서 선택','기안 내 모든 항목 작성 필수 (카드종류, 요청구분, 본부/팀명, 은행명, 계좌번호 등)','첨부파일: 통장사본 (법인카드 전용 계좌 사용 권고)','발급 사유: 필수 발급대상이 아닌 경우 사유 자세히 기재'], warn:'결재선: 상신자 → 재경팀장(합의) → 상신자 소속 팀장/본부장(결재) → 재경팀 박지우 사원(업무처리)', source:'법인카드 사용 지침 3p' }},
      { id:'n2', keywords:['한도','한도금액','카드한도','발급한도'], title:'직급별 법인카드 한도',
        answer:{ paras:['필수발급 대상별 법인카드 한도는 아래와 같습니다.'], items:['임원: 1천만원','팀장 / 영업팀장: 2백만원 ~ 5백만원','영업팀원: 1백만원','각 팀별 팀원 1명: 1백만원'], note:'한도 적용 기간: 전월 사용액 + 당월 대금 이체 전일 사용액 합산', source:'법인카드 사용 지침 2p' }},
      { id:'n3', keywords:['한도증액','한도초과','증액요청','한도 초과'], title:'한도 초과 · 증액 요청',
        answer:{ paras:['한도 초과로 결제가 안 될 경우 한도 증액 기안을 상신하세요.'], items:['기재사항: 카드번호 / 증액 요청 기간 / 증액 요청 금액 / 증액 요청 사유','결재선: 상신자 → 재경팀장(합의) → 상신자 소속 팀장/본부장(결재) → 재경팀 박지우 사원(업무처리)','한도 적용 기간: 전월 사용액 + 당월 대금 이체 전 사용액 합산'], note:'예시) 출장으로 인한 한도 증액 요청 시 출장신청서를 관련문서로 연결', source:'법인카드 사용 지침 2p / Q&A 9p' }},
      { id:'n4', keywords:['분실','도난','잃어버','카드정지','카드 분실'], title:'법인카드 분실 · 도난',
        answer:{ paras:['분실 즉시 카드사에 연락해 사용 정지 후 재발급 기안을 상신하세요.'], items:['① 카드사에 즉시 연락 → 카드 정지 요청 (하나카드 고객센터: 1800-1111)','② 그룹웨어에서 재발급 신청 기안 상신 (신규발급과 동일 절차)','③ 재발급 사유에 "분실로 인한 재발급" 명시','④ 기안 내 분실카드 정지 여부 기재'], warn:'분실 전 부정사용 발생 시 경위서 작성 필요. 연체 2회 이상 시 법인카드 회수.', source:'법인카드 사용 지침 4p' }},
      { id:'n5', keywords:['반납','퇴사','카드반납'], title:'퇴사 시 법인카드 반납',
        answer:{ paras:['퇴사 시 법인카드를 반드시 재경팀에 반납해야 합니다.'], items:['담당자: 재경팀 박지우 사원에게 직접 반납','주유 및 하이패스 카드도 함께 반납'], source:'법인카드 사용 지침 15p' }},
      { id:'n6', keywords:['비밀번호','PIN','카드 비밀번호'], title:'법인카드 비밀번호 설정',
        answer:{ paras:['비밀번호는 본인이 직접 카드사를 통해 설정하거나, 재경팀 박지우 사원에게 요청 시 홈페이지에서 설정해 드립니다.'], items:['하나카드 고객센터: 1800-1111','개인정보 확인 후 설정 또는 변경 가능','재경팀 박지우 사원 요청 시 홈페이지에서 설정 가능'], source:'법인카드 사용 지침 16p' }}
    ]
  },
  {
    id:'usage', label:'사용 규정', color:'#1D9E75',
    nodes:[
      { id:'n7', keywords:['개인사용','개인용도','사적사용','개인 사용'], title:'개인 용도 사용 금지',
        answer:{ paras:['법인카드는 업무 관련 경비에만 사용 가능합니다. 개인 용도 사용은 엄격히 금지됩니다.'], items:['개인사용분 → 해당 금액 "전표 미처리" 후 본인이 개인 정산 (재경팀 크로스체크 필수)','개인형 법인카드: 각 사용자별 법인카드 이용대금 출금 계좌로 이체','주유·하이패스 카드 개인사용분 입금 계좌: 하나은행 776-910033-65804 (예금주: 우리와 주식회사)','휴일 사용 시 업무 관련 경비임을 입증할 증빙 첨부 필수'], warn:'개인사용분 입금 지연으로 카드대금 연체 시 회사 신용도 하락. 2회 이상 연체 시 법인카드 회수.', source:'법인카드 사용 지침 14p / Q&A 5p' }},
      { id:'n8', keywords:['카드종류','개인형','공용','주유카드','하이패스'], title:'법인카드 종류 및 구분',
        answer:{ paras:['법인카드는 용도에 따라 세 가지로 구분됩니다.'], items:['개인형 법인카드: 개인 명의로 발급 — 식대, 회식비, 회의비, 여비교통비, 접대비 등','공용 법인카드: 법인 명의로 발급 — 개인형 카드 계정 외 나머지 계정 (사전 기안 필수)','주유·하이패스 카드: 법인 명의 발급, 업무용 차량 전용','공용카드 보유 부서: 인사총무팀, 브랜드전략팀, 온라인팀(본사) / 관리팀(음성공장) / 연구개발팀(연구소)'], warn:'공용법인카드 사용 시 반드시 사전 기안 품의 후 결제. 사용대장 작성 및 기안용지 제출 필수.', source:'법인카드 사용 지침 5~6p' }},
      { id:'n9', keywords:['사전기안','기안품의','사전품의'], title:'사전 기안이 필요한 경우',
        answer:{ paras:['아래 계정 외 다른 계정으로 법인카드 사용 시 사전 기안 품의 필수입니다.'], items:['기안 없이 사용 가능한 개인형 카드 계정: 식대, 회식비, 회의비, 여비교통비, 차량유지비, 접대비, 우편료, 택배비, 퀵서비스, 증명발급수수료','이 외 계정(소모품비, 시험연구비, 견본비, 교육훈련비 등): 공용법인카드 + 사전 기안 필수','결재 기준 — 팀장 전결: 30만원 미만 / 본부장 전결: 100만원 미만 / 대표이사 전결: 100만원 이상'], source:'법인카드 사용 지침 7p / Q&A 3p' }}
    ]
  },
  {
    id:'expense', label:'계정별 사용 기준', color:'#BA7517',

let activeNode = null, activeFilter = null;

function renderTags() {
  document.getElementById('tags').innerHTML = cats.map(c =>
    `<button class="tag" id="tag-${c.id}" onclick="filterCat('${c.id}')">${c.label}</button>`
  ).join('');
}
function filterCat(id) {
  activeFilter = activeFilter === id ? null : id;
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('on'));
  if (activeFilter) document.getElementById('tag-' + activeFilter).classList.add('on');
  renderTree(document.getElementById('srch').value);
}
function doSearch(q) { renderTree(q); }
function matchNode(node, q) {
  if (!q) return true;
  const lq = q.toLowerCase().replace(/\s/g, '');
  return node.keywords.some(k => k.toLowerCase().replace(/\s/g,'').includes(lq) || lq.includes(k.toLowerCase().replace(/\s/g,'')))
    || node.title.toLowerCase().replace(/\s/g,'').includes(lq);
}
function renderTree(q = '') {
  const el = document.getElementById('tree');
  let html = '', any = false;
  cats.forEach(cat => {
    if (activeFilter && activeFilter !== cat.id) return;
    const filtered = cat.nodes.filter(n => matchNode(n, q));
    if (!filtered.length) return;
    any = true;
    html += `<div class="tree-section">
      <div class="cat-header" onclick="toggleCat('body-${cat.id}','arr-${cat.id}')">
        <span class="cat-dot" style="background:${cat.color}"></span>
        <span class="cat-title">${cat.label}</span>
        <span class="cat-count">${filtered.length}개</span>
        <span class="cat-arrow open" id="arr-${cat.id}">▶</span>
      </div>
      <div class="nodes open" id="body-${cat.id}">
        ${filtered.map(n => `
          <div class="node-row">
            <div class="node-line"></div>
            <button class="node-btn ${activeNode===n.id?'active':''}" id="nb-${n.id}" onclick="selectNode('${n.id}')">
              <div class="node-kw">${n.keywords.slice(0,4).map(k=>`<span class="kw-chip">${k}</span>`).join('')}</div>
              <div class="node-title">${n.title}</div>
            </button>
          </div>`).join('')}
      </div>
    </div>`;
  });
  el.innerHTML = any ? html : `<div class="empty">검색 결과가 없습니다.</div>`;
}
function toggleCat(bodyId, arrId) {
  const b = document.getElementById(bodyId), a = document.getElementById(arrId);
  b.classList.toggle('open', !b.classList.contains('open'));
  a.classList.toggle('open', !a.classList.contains('open'));
}
function selectNode(id) {
  const existing = document.getElementById('ans-panel');
  if (existing) existing.remove();
  if (activeNode === id) {
    activeNode = null;
    document.querySelectorAll('.node-btn').forEach(b => b.classList.remove('active'));
    return;
  }
  activeNode = id;
  document.querySelectorAll('.node-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nb-' + id);
  if (nb) nb.classList.add('active');
  const node = cats.flatMap(c => c.nodes).find(n => n.id === id);
  if (!node) return;
  const a = node.answer;
  let body = '';
  if (a.paras) a.paras.forEach(p => { body += `<p>${p}</p>`; });
  if (a.items) body += '<ul class="ans-list">' + a.items.map(i => `<li>${i}</li>`).join('') + '</ul>';
  if (a.warn) body += `<div class="ans-warn">⚠️ ${a.warn}</div>`;
  if (a.note) body += `<p class="ans-note">${a.note}</p>`;
  if (a.source) body += `<span class="ans-source">출처: ${a.source}</span>`;
  const panel = document.createElement('div');
  panel.id = 'ans-panel';
  panel.className = 'answer-panel';
  panel.innerHTML = `
    <div class="ans-header">
      <span class="ans-header-text">${node.title}</span>
      <button class="ans-close" onclick="closeAns()">×</button>
    </div>
    <div class="ans-body">${body}</div>
  `;
  const nodeRow = nb.closest('.node-row');
  nodeRow.insertAdjacentElement('afterend', panel);
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function closeAns() {
  const panel = document.getElementById('ans-panel');
  if (panel) panel.remove();
  activeNode = null;
  document.querySelectorAll('.node-btn').forEach(b => b.classList.remove('active'));
}
renderTags();
renderTree();
</script>
</body>
</html>
